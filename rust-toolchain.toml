[toolchain]
# Pin the Rust version used across development and CI. Component list is kept
# minimal so that the standard GitHub Actions rust-toolchain installer works on
# Linux, macOS, and Windows hosts. Windows users who want the MSYS2/MINGW64
# host toolchain should run `rustup default stable-x86_64-pc-windows-gnu`
# locally; see docs/build-windows.md for details.
channel = "1.97.1"
components = ["rustfmt", "clippy"]
