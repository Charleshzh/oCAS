name: publish-batch

on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish to crates.io'
        required: true
        type: choice
        options:
          - ocas-core
          - ocas-domain
          - ocas-poly
          - ocas-atom
          - ocas-rewrite
          - ocas-calc
          - ocas-eval
          - ocas-parse
          - ocas
          - ocas-py
          - ocas-c
          - ocas-gpl

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - uses: Swatinem/rust-cache@v2

      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ${{ github.event.inputs.crate }}
