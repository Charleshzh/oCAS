name: publish-batch

on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish to crates.io'
        required: true
        type: choice
        options:
          - ocas-rewrite
          - ocas-calc
          - ocas-eval
          - ocas-gpl
          - ocas
          - ocas-c

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ${{ github.event.inputs.crate }}
