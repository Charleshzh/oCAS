name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --features egg --exclude ocas-py -- -D warnings

  clippy-all-features:
    name: Clippy (all pure-Rust features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # NOTE: `system-libs` is intentionally excluded here — it requires the
      # system GMP/MPFR libraries, which the pure-Rust job does not install.
      # It is exercised in the `test-full` job that installs libgmp/libmpfr.
      - run: cargo clippy --workspace --all-targets --features egg,jit,simd,ntt,sprs,fast-poly,mimalloc --exclude ocas-py -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # ocas-py uses pyo3/extension-module and cannot be tested as a standalone binary.
      - run: cargo test --workspace --exclude ocas-py --features egg

  test-all-features:
    name: Test all pure-Rust features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      # `system-libs` excluded (needs system GMP/MPFR); covered by test-full.
      - run: cargo test --workspace --exclude ocas-py --features egg,jit,simd,ntt,sprs,fast-poly,mimalloc

  test-full:
    name: Test with LGPL backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          # libmpc-dev is required by the `system-libs` feature, which probes
          # for the system MPC library in addition to GMP/MPFR.
          sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev cmake pkg-config m4
      - name: Verify GMP/MPFR/pkg-config
        run: |
          echo "=== pkg-config ==="
          which pkg-config || echo "pkg-config NOT FOUND"
          echo "=== GMP ==="
          pkg-config --modversion gmp || echo "GMP NOT FOUND"
          echo "=== MPFR ==="
          pkg-config --modversion mpfr || echo "MPFR NOT FOUND"
          echo "=== cmake ==="
          which cmake || echo "cmake NOT FOUND"
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: Build with backend features
        run: cargo build -p ocas --features gmp,mpfr,flint
      - name: Run tests with backend features
        run: cargo test -p ocas --features gmp,mpfr,flint
      - name: Run tests with backend + NTT/sparse/fast-polynomial features
        run: cargo test -p ocas --features gmp,mpfr,flint,ntt,sprs,fast-poly
      # NOTE: `system-libs` is dropped from CI. gmp-mpfr-sys 1.7.1 requires
      # system MPC >= 1.4.1, but Ubuntu 24.04 ships libmpc 1.3.1, so the
      # system-MPC probe always fails. system-libs is an optional opt-in
      # backend; users on newer distros enable it manually. `mimalloc` (pure
      # Rust) is still tested here.
      - name: Run tests with backend + mimalloc features
        run: cargo test -p ocas --features gmp,mpfr,flint,mimalloc
      - name: Test ocas-eval with JIT feature
        run: cargo test -p ocas-eval --features jit
      - name: Test ocas-eval with SIMD feature
        run: cargo test -p ocas-eval --features simd

  build-bindings:
    name: Build language bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev
      - name: Build C bindings
        run: cargo build -p ocas-c
      - name: Check Python bindings compile
        run: cargo check -p ocas-py
      - name: Build Python bindings
        run: cargo build -p ocas-py
      - name: Install maturin and pytest
        run: pip install maturin pytest
      - name: Build and install wheel
        run: maturin build --release -m ocas-py/Cargo.toml && pip install --force-reinstall target/wheels/*.whl
      - name: Run Python tests
        run: pytest ocas-tests/tests/python/ -v
      - name: Compile and run C example
        run: |
          gcc ocas-c/examples/expression.c -I ocas-c/include -L target/debug -locas_c -o /tmp/ocas_expression
          LD_LIBRARY_PATH=target/debug /tmp/ocas_expression

  # Validate that the public Rust API documentation builds cleanly on every
  # push/PR. Rust API reference is served from docs.rs (auto-built on
  # crates.io publish), so this is a build check, not a deploy — broken
  # intra-doc links would otherwise only surface at publish time.
  rustdoc-build:
    name: Rustdoc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D rustdoc::invalid_codeblock_attributes"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.1
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (pure-Rust features)
        # Use explicit pure-Rust features instead of --all-features, which
        # would force-enable gmp-mpfr-sys's `mpc` feature and trigger a
        # strict system MPC version check that fails on the runner.
        run: cargo doc --no-deps --features egg,jit,simd,ntt,sprs,fast-poly -p ocas

  miri:
    name: Miri memory safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on ocas-core
        timeout-minutes: 20
        run: |
          cargo +nightly miri test -p ocas-core --lib -- --skip allocate_many_random_values --skip allocate_random_sizes
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-ignore-leaks"
