name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ocas-py uses pyo3/extension-module and cannot be tested as a standalone binary.
      - run: cargo test --workspace --exclude ocas-py

  test-full:
    name: Test with LGPL backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake pkg-config
      - name: Verify GMP/MPFR/pkg-config
        run: |
          echo "=== pkg-config ==="
          which pkg-config || echo "pkg-config NOT FOUND"
          echo "=== GMP ==="
          pkg-config --modversion gmp || echo "GMP NOT FOUND"
          echo "=== MPFR ==="
          pkg-config --modversion mpfr || echo "MPFR NOT FOUND"
          echo "=== cmake ==="
          which cmake || echo "cmake NOT FOUND"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with backend features (diagnostic)
        run: cargo build -p ocas --features gmp,mpfr,flint 2>&1 | tail -50
      - name: Run tests with backend features
        run: cargo test -p ocas --features gmp,mpfr,flint 2>&1 | tail -80
      - name: Test ocas-eval with JIT feature
        run: cargo test -p ocas-eval --features jit 2>&1 | tail -40
      - name: Test ocas-eval with SIMD feature
        run: cargo test -p ocas-eval --features simd 2>&1 | tail -40

  build-bindings:
    name: Build language bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev
      - name: Build C bindings
        run: cargo build -p ocas-c
      - name: Build Python bindings
        run: cargo build -p ocas-py
      - name: Install maturin and pytest
        run: pip install maturin pytest
      - name: Build and install wheel
        run: maturin build --release -m ocas-py/Cargo.toml && pip install --force-reinstall target/wheels/*.whl
      - name: Run Python tests
        run: pytest ocas-tests/tests/python/ -v
      - name: Compile and run C example
        run: |
          gcc ocas-c/examples/expression.c -I ocas-c/include -L target/debug -locas_c -o /tmp/ocas_expression
          LD_LIBRARY_PATH=target/debug /tmp/ocas_expression

  miri:
    name: Miri memory safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on ocas-core
        timeout-minutes: 20
        run: |
          cargo +nightly miri test -p ocas-core --lib -- --skip allocate_many_random_values --skip allocate_random_sizes
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-ignore-leaks"
