name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ocas-py uses pyo3/extension-module and cannot be tested as a standalone binary.
      - run: cargo test --workspace --exclude ocas-py

  test-full:
    name: Test with LGPL backends
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev libflint-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with backend features
        run: cargo test -p ocas --features gmp,mpfr,flint

  build-bindings:
    name: Build language bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev
      - name: Build C bindings
        run: cargo build -p ocas-c
      - name: Build Python bindings
        run: cargo build -p ocas-py
      - name: Compile and run C example
        run: |
          gcc ocas-c/examples/basic.c -I ocas-c/include -L target/debug -locas_c -o /tmp/ocas_basic
          LD_LIBRARY_PATH=target/debug /tmp/ocas_basic

  miri:
    name: Miri memory safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on ocas-core
        timeout-minutes: 12
        run: |
          cargo +nightly miri test -p ocas-core --lib -- --skip allocate_many_random_values --skip allocate_random_sizes
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-ignore-leaks"
