name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# `contents: write` lets peaceiris/actions-gh-pages push to the gh-pages branch.
permissions:
  contents: write

# Do not cancel an in-flight deploy; PR builds run to completion but never deploy.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mdbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      # ──────────────────────────────────────────────────────────────
      # 1. Build — two independent language editions.
      # ──────────────────────────────────────────────────────────────
      - name: Build English edition
        run: mdbook build docs/book/en
      - name: Build Chinese edition
        run: mdbook build docs/book/zh

      # ──────────────────────────────────────────────────────────────
      # 2. Stage — assemble the EXACT tree that will be deployed, into
      #    a temp dir. Doing this before lychee means the link-checker
      #    validates real deployed paths, not raw build output whose
      #    parent-directory assets can mask 404s (the root cause of the
      #    language-switcher bug fixed in cb7fcb9).
      #
      #    gh-pages layout:
      #      /index.html              → redirect to /latest/en/
      #      /404.html                root-level 404
      #      /latest/en/  /latest/zh/   refreshed on every main push & tag
      #      /v<x.y.z>/en/  /v<x.y.z>/zh/  frozen snapshot per tag
      # ──────────────────────────────────────────────────────────────
      - name: Stage site tree
        id: stage
        run: |
          set -euo pipefail
          root="$(mktemp -d)"

          # Determine versioned snapshot dir (empty on non-tag events).
          versioned=""
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            versioned="v${GITHUB_REF_NAME#v}"
          fi

          # Copy both language books into <prefix>/{en,zh}/.
          # Also place the shared language-switcher assets at <prefix>/
          # because mdBook emits HTML referencing ../language-switcher.*
          # (the assets live one level above each book in the source tree).
          copy_editions() {
            local prefix="$1"
            mkdir -p "$root/$prefix"
            cp -r docs/book/en/book/html/. "$root/$prefix/en/"
            cp -r docs/book/zh/book/html/. "$root/$prefix/zh/"
            cp docs/book/language-switcher.js  "$root/$prefix/"
            cp docs/book/language-switcher.css "$root/$prefix/"
          }

          copy_editions latest
          [[ -n "$versioned" ]] && copy_editions "$versioned"

          # Root-level files.
          # A minimal self-contained 404 (no external CSS) — the book's
          # own 404.html references css/ that only exists inside en/ or
          # zh/, so it breaks at the site root.
          touch "$root/.nojekyll"
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '  <head>' \
            '    <meta charset="utf-8">' \
            '    <meta http-equiv="refresh" content="8; url=latest/en/">' \
            '    <title>oCAS — Page Not Found</title>' \
            '    <style>body{font-family:system-ui,sans-serif;max-width:40em;margin:4em auto;padding:0 1em;color:#333}a{color:#0974d9}</style>' \
            '  </head>' \
            '  <body>' \
            '    <h1>404 — Page Not Found / 页面未找到</h1>' \
            '    <p>The page you requested does not exist. You will be redirected to the documentation shortly.</p>' \
            '    <p><a href="latest/en/">English documentation</a> · <a href="latest/zh/">中文文档</a></p>' \
            '  </body>' \
            '</html>' > "$root/404.html"
          # Root index redirects to the English latest book. Built with
          # printf (not a heredoc) because the unindented HTML lines would
          # terminate the YAML | block scalar that wraps this run script.
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="en">' \
            '  <head>' \
            '    <meta charset="utf-8">' \
            '    <meta http-equiv="refresh" content="0; url=latest/en/">' \
            '    <link rel="canonical" href="latest/en/">' \
            '    <title>oCAS Documentation</title>' \
            '  </head>' \
            '  <body>' \
            '    Redirecting to <a href="latest/en/">the latest oCAS documentation</a>…' \
            '    (<a href="latest/zh/">中文</a>)' \
            '  </body>' \
            '</html>' > "$root/index.html"

          echo "root=$root"           >> "$GITHUB_OUTPUT"
          if [[ -n "$versioned" ]]; then
            echo "label=${versioned}" >> "$GITHUB_OUTPUT"
          else
            echo "label=latest"       >> "$GITHUB_OUTPUT"
          fi

      # ──────────────────────────────────────────────────────────────
      # 3. Link-check — validate the staged tree (what users will see).
      # ──────────────────────────────────────────────────────────────
      - name: Link-check staged site (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml "${{ steps.stage.outputs.root }}"
          fail: true

      # ──────────────────────────────────────────────────────────────
      # 4. Deploy — single step; PRs skip. keep_files preserves older
      #    version snapshots across deploys.
      # ──────────────────────────────────────────────────────────────
      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.stage.outputs.root }}
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'docs: deploy ${{ steps.stage.outputs.label }}'
