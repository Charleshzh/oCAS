name: docs

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  mdbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      - name: Build the book
        run: mdbook build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/html
      - name: Deploy to GitHub Pages
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/deploy-pages@v4

  rustdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rustdoc
        # Use explicit pure-Rust features instead of --all-features, which would
        # force-enable gmp-mpfr-sys's `mpc` feature and trigger a strict system
        # MPC version check that fails on the runner.
        run: cargo doc --no-deps --features egg,jit,simd -p ocas
      - name: Upload rustdoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc
          path: target/doc
