name: Security audit

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pin a recent toolchain: audit-check compiles the latest cargo-audit,
      # whose deps (e.g. kstring 2.x) require Rust >= 1.96. Without this the
      # default toolchain is too old and the audit job fails to build.
      - uses: dtolnay/rust-toolchain@stable
      # Install a pinned cargo-audit. Version 0.22.2 is required: 0.21.x
      # cannot parse the current advisory-db format (fails on
      # RUSTSEC-2026-0041 TOML). The stable toolchain above satisfies its
      # rustc >= 1.96 dependency requirement.
      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Run cargo audit
        run: cargo audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
