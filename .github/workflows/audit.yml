name: Security audit

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin a recent toolchain: audit-check compiles the latest cargo-audit,
      # whose deps (e.g. kstring 2.x) require Rust >= 1.96. Without this the
      # default toolchain is too old and the audit job fails to build.
      - uses: dtolnay/rust-toolchain@stable
      # Install a pinned cargo-audit instead of letting audit-check compile
      # the latest release on every run: the latest release's dependency
      # requirements can outpace the stable toolchain and break the job
      # (as happened with cargo-audit v0.22.2).
      - name: Install pinned cargo-audit
        run: cargo install cargo-audit --locked --version 0.21.2
      - name: Run cargo audit
        run: cargo audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
