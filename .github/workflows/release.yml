name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Read workspace version
        id: workspace-version
        run: |
          WS_VERSION=$(grep -E '^version\s*=' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "workspace-version=$WS_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag version matches workspace version
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          WS_VERSION="${{ steps.workspace-version.outputs.workspace-version }}"
          # Strip any pre-release suffix to get the tag's base version.
          TAG_BASE="${TAG_VERSION%%-*}"
          # A release tag (no pre-release suffix) must exactly match the
          # workspace version. A pre-release tag only needs its base version
          # to be >= the workspace version, so it can validate the pipeline
          # either for the current version (v0.13.1-test1) or for the next
          # one (v0.13.2-test1) before the workspace is bumped.
          if [ "$TAG_VERSION" == "$TAG_BASE" ] && [ "$TAG_VERSION" != "$WS_VERSION" ]; then
            echo "Release tag $TAG_VERSION does not match workspace version $WS_VERSION"
            exit 1
          fi
          if [ "$TAG_BASE" != "$WS_VERSION" ]; then
            HIGHER=$(printf '%s\n%s\n' "$WS_VERSION" "$TAG_BASE" | sort -V | tail -n1)
            if [ "$HIGHER" != "$TAG_BASE" ]; then
              echo "Pre-release base $TAG_BASE is older than workspace version $WS_VERSION"
              exit 1
            fi
          fi

  publish-dry-run:
    name: Dry-run publish all crates
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - uses: actions/checkout@v7

      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1

      - uses: Swatinem/rust-cache@v2

      - name: Dry-run publish workspace crates
        run: |
          # Crates may already exist on crates.io when this runs (the real
          # publish is handled by release-plz on main). A dry-run failure due
          # to "already exists" is not a packaging problem, so we only fail
          # on errors that are NOT the already-exists warning.
          failed=0
          for crate in ocas-core ocas-domain ocas-poly ocas-atom ocas-rewrite ocas-calc ocas-eval ocas-parse ocas ocas-c ocas-py ocas-gpl; do
            echo "=== Dry-run $crate ==="
            out=$(cargo publish --dry-run -p "$crate" 2>&1) || {
              if echo "$out" | grep -q "already exists on crates.io"; then
                echo "(skip) $crate already published"
              else
                echo "$out"
                failed=1
              fi
            }
          done
          exit $failed

  build-c-bindings:
    name: Build C bindings (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [extract-version, publish-dry-run]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_so: libocas_c.so
            lib_a: libocas_c.a
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_so: ocas_c.dll
            lib_a: ocas_c.lib

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build C bindings
        run: cargo build -p ocas-c --release --target ${{ matrix.target }}

      - name: Package C bindings
        id: package
        shell: bash
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          ARTIFACT="ocas-c-${VERSION}-${{ matrix.target }}"
          mkdir -p "$ARTIFACT"
          cp "target/${{ matrix.target }}/release/${{ matrix.lib_so }}" "$ARTIFACT/" || true
          cp "target/${{ matrix.target }}/release/${{ matrix.lib_a }}" "$ARTIFACT/" || true
          # On Windows the import library may be named ocas_c.dll.lib.
          cp "target/${{ matrix.target }}/release/ocas_c.dll.lib" "$ARTIFACT/" || true
          cp ocas-c/include/ocas.h ocas-c/include/ocas.hpp "$ARTIFACT/" || true
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${ARTIFACT}.zip" "$ARTIFACT"
            echo "artifact=${ARTIFACT}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
            echo "artifact=${ARTIFACT}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload C bindings to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.artifact }}

  # NOTE: Python wheels are NOT built here. wheels.yml has its own
  # `on: push: tags: v*` trigger and runs independently. Publishing to
  # PyPI/TestPyPI must NOT go through a reusable-workflow call: PyPI
  # trusted publishing is not officially supported for reusable workflows,
  # and the OIDC token's `workflow_ref` claim then points at this caller
  # (release.yml) instead of wheels.yml, which makes the registered
  # publisher (wheels.yml) mismatch and the exchange fail with
  # `invalid-publisher`.
