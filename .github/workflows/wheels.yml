name: wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
          - os: windows-latest
            target: x86_64
          # macOS: free Intel runners (macos-13) have very limited capacity and
          # queue indefinitely on the free tier. Build BOTH the Apple-Silicon
          # (aarch64) and Intel (x86_64) wheels on the always-available
          # macos-latest image by cross-compiling the Intel wheel via
          # Rosetta/rustup target `x86_64-apple-darwin`.
          - os: macos-latest
            target: aarch64
          - os: macos-latest
            target: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.97.1

      - uses: Swatinem/rust-cache@v2

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: "1.11.0"
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: ocas-py
          args: --release --out ../dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist
          if-no-files-found: error

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          maturin-version: "1.11.0"
          working-directory: ocas-py
          args: --out ../dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist
          if-no-files-found: error

  # Pre-release tags (v0.x.y-*) and manual runs go to TestPyPI.
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-'))
    environment: pypi-test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  # Release tags (v0.x.y, no pre-release suffix) go to production PyPI.
  # Requires a trusted publisher configured on PyPI for this repo, the
  # wheels.yml workflow and the `pypi` environment.
  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
