name: release-plz

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        # Use stable (>= 1.90): cargo metadata on 1.89 fails to resolve
        # `workspace.dependencies` inheritance for published crates
        # ("dependency.ahash was not found in workspace.dependencies").
        # Pinned to 1.97.1 via rust-toolchain.toml.
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Python development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          # Pin the latest release-plz: older versions fail to resolve
          # `workspace.dependencies` inheritance for the ahash workspace
          # dep added in 0.15.0 ("dependency.ahash was not found").
          version: "0.3.160"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
