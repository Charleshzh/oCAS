[workspace]
# Path to the workspace changelog. release-plz updates this single file.
changelog_path = "CHANGELOG.md"
# Keep the root CHANGELOG.md up to date.
changelog_update = true
# Enable automatic GitHub releases.
git_release_enable = true
# Create a production release (not a draft).
git_release_type = "prod"
# Publish to crates.io.
publish = true
# Do not publish if the working directory has uncommitted changes.
publish_allow_dirty = false
# Timeout for each `cargo publish` invocation.
publish_timeout = "10m"
# Release PR is not a draft.
pr_draft = false
# Labels to attach to the release PR.
pr_labels = ["release"]

# crates.io rate-limits new crates to 5 per day. To publish all workspace
# crates, release them in batches by temporarily setting publish=false below.
# Batch 1 (done): ocas-core, ocas-domain, ocas-poly, ocas-atom, ocas-parse
# Batch 2 (now):   ocas-rewrite, ocas-calc, ocas-eval, ocas-gpl, ocas
# Batch 3 (24h):  ocas-c, ocas-py

# === Batch 3: temporarily skipped to respect crates.io new-crate rate limit ===
[[package]]
name = "ocas-c"
publish = false

# ocas-py is a Python extension module (cdylib) and is published to PyPI, not crates.io.
[[package]]
name = "ocas-py"
publish = false

# ocas-tests is an internal integration/benchmark crate.
[[package]]
name = "ocas-tests"
publish = false
