[workspace]
# Path to the workspace changelog. release-plz updates this single file.
changelog_path = "CHANGELOG.md"
# Keep the root CHANGELOG.md up to date.
changelog_update = true
# Enable automatic GitHub releases.
git_release_enable = true
# Create a production release (not a draft).
git_release_type = "prod"
# Publish to crates.io.
publish = true
# Do not publish if the working directory has uncommitted changes.
publish_allow_dirty = false
# Timeout for each `cargo publish` invocation.
publish_timeout = "10m"
# Release PR is not a draft.
pr_draft = false
# Labels to attach to the release PR.
pr_labels = ["release"]

# crates.io new-crate rate limit note: if you ever need to publish many
# new crates at once, release-plz will hit crates.io's 5 new crates/day limit.
# Use a temporary publish=false override per package in that case, or publish
# manually in batches via `.github/workflows/publish-batch.yml`.

# ocas-tests is an internal integration/benchmark crate.
[[package]]
name = "ocas-tests"
publish = false
