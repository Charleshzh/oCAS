[book]
title = "oCAS — open Computer Algebra System"
authors = ["Charles H. Zhong"]
language = "en"
src = "src"

[build]
build-dir = "book/html"

[output.html]
git-repository-url = "https://github.com/charleshzh/ocas"
# mdBook's {path} placeholder already includes the src/ prefix (e.g.
# "src/introduction.md"), so edit-url-template must NOT repeat it.
edit-url-template = "https://github.com/charleshzh/ocas/edit/main/docs/book/en/{path}"
# Language switcher shared with the Chinese book.
additional-js = ["../language-switcher.js"]
additional-css = ["../language-switcher.css"]

[output.html.search]
limit-results = 30
use-boolean-and = true
